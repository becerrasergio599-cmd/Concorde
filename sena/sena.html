<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Página SENA</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      color: #111;
    }

    header {
      background-color: #00a651; /* Verde SENA */
      color: white;
      padding: 15px;
      text-align: center;
    }

    nav ul {
      list-style: none;
      padding: 0;
      margin: 10px 0 0;
    }

    nav ul li {
      display: inline;
      margin: 10px;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

   
    section, main {
      padding: 20px;
      margin: 0;              
      background: transparent; 
      border-radius: 0;
    }

    

    .toolbar {
      text-align: center;
      border-top: 0;
    }

    button {
      background-color: #00a651;
      color: white;
      border: none;
      padding: 10px 15px;
      margin: 5px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #007a3d;
    }

    input {
      padding: 8px;
      width: 100%;
      max-width: 300px;
    }

    /* Ajuste para que el título “no se vea como caja” */
    h1, h2 {
      margin-top: 0;
    }

    form {
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <header>
    <h1>Mi Plataforma SENA</h1>
  
    <nav>
      <ul>
        <li><a href="#">Inicio</a></li>
        <li><a href="#">Cursos</a></li>
        <li><a href="#">Contacto</a></li>
        <li><a href="login.html">iniciar sesion</a></li>
      </ul>
    </nav>
  </header>

  <section class="toolbar">
    <h2>Herramientas</h2>
    <button>Inicio</button>
    <button>Perfil</button>
    <button>Salir</button>
  </section>

  <main>
<img src="logosena.jpg" alt="Logo SENA" style="height:60px; margin-top:10px;">
    <h2>Bienvenido</h2>
    <p>Esta es una simulación de una plataforma tipo SENA.</p>
    
  </main>

  <section>
    <h2>Formulario</h2>
    <form>
      <label>Nombre:</label><br>
      <input type="text" required><br><br>

      <label>Correo:</label><br>
      <input type="email" required><br><br>

      <button type="submit">Enviar</button>
    </form>
  </section>

</body>
</html>
